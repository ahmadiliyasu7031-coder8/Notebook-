workflows:
  pocket-exercise-book-android:
    name: Pocket Exercise Book - Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable

    scripts:
      - name: Scaffold missing Android platform files
        script: |
          flutter create --platforms=android --org com.ahmerdee --project-name pocket_exercise_book .

          # Force Android SDK 36
          if [ -f android/app/build.gradle.kts ]; then
            sed -i.bak 's/compileSdk = 34/compileSdk = 36/g' android/app/build.gradle.kts
            sed -i.bak 's/targetSdk = 34/targetSdk = 36/g' android/app/build.gradle.kts
          fi

          if [ -f android/app/build.gradle ]; then
            sed -i.bak 's/compileSdkVersion 34/compileSdkVersion 36/g' android/app/build.gradle
            sed -i.bak 's/targetSdkVersion 34/targetSdkVersion 36/g' android/app/build.gradle
          fi

          # The app must display as "My School Bag" on the device, even
          # though the underlying Flutter project id stays pocket_exercise_book.
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            sed -i.bak 's/android:label="[^"]*"/android:label="My School Bag"/g' android/app/src/main/AndroidManifest.xml
          fi

          python3 - << 'PYEOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f:
              content = f.read()

          if "<queries>" not in content:
              queries = """
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:scheme="https"/>
                  </intent>
              </queries>
              """
              content = content.replace("</manifest>", queries + "\n</manifest>")

          with open(path, "w") as f:
              f.write(content)
          PYEOF

      - name: Get packages
        script: flutter pub get

      - name: Build Release APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true

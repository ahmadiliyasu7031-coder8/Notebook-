name: pocket_exercise_book
description: "Pocket Exercise Book — Your School Bag In Your Pocket"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.9

  # Local storage
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # PDF export (render captured page images into a PDF)
  pdf: ^3.10.7

  # Share exported PDFs / backup files
  share_plus: ^12.0.0

  # Pick a backup file to restore
  file_picker: ^10.3.3

  # Password hashing for notebook lock
  crypto: ^3.0.3

  # Date formatting (Recent notebooks, etc.)
  intl: ^0.18.1

  # Open the WhatsApp deep link from the footer
  url_launcher: ^6.2.5

  # UUIDs for notebook/page/stroke ids
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
